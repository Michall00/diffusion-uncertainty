# Overnight diagnostic sweep for Stable Diffusion UQ guidance.
#
# Use this as a base config for prepare_recap_coco_sweep.py. It is intentionally
# wider than stable_diffusion_diagnostic_epistemic.yaml, but still avoids the
# most aggressive epistemic defaults that produced artifacts.
#
# Recommended first run:
#   - 25 caption prompts
#   - no FID during this wide sweep
#   - compute aggregate CLIP and inspect W&B overview
#
# Enabled groups expand to 52 trials. With 25 prompts this is 1300 generations.

project_name: diffusion-uncertainty-overnight-epistemic
model_id: CompVis/stable-diffusion-v1-4

defaults:
  device: cuda
  num_steps: 20
  guidance_scale: 7.5
  guidance_start_step: 0
  guidance_n_steps: 8
  percentile: 0.90
  lr: 0.20
  height: 512
  width: 512
  num_mc: 3

  laplace_mode: last_layer
  n_ref: 1
  n_pairs: 20
  n_mc_subnet: 4
  subnet_max_params: 20000

seeds: [42]
prompts:
  - "a photo of a cat"

sweep:
  - name: fixed_baseline
    enabled: true
    methods: [baseline]

  - name: fixed_aleatoric_best
    enabled: true
    methods: [aleatoric]
    guidance_start_step: 0
    guidance_n_steps: 8
    percentile: 0.95
    lr: 1.0
    num_mc: 5

  # Strength probe: does epistemic guidance work only when correction is weak?
  - name: gradient_lr_probe
    enabled: true
    methods: [gradient]
    guidance_start_step: 0
    guidance_n_steps: 8
    percentile: 0.90
    lr: [0.03, 0.05, 0.10, 0.20, 0.30, 0.50]
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  - name: resampling_lr_probe
    enabled: true
    methods: [resampling]
    guidance_start_step: 0
    guidance_n_steps: 8
    percentile: 0.90
    lr: [0.03, 0.05, 0.10, 0.20, 0.30, 0.50]
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  # Window probe: later/shorter guidance should preserve image structure better.
  - name: gradient_window_probe
    enabled: true
    methods: [gradient]
    guidance_start_step: [2, 4, 6]
    guidance_n_steps: [4, 6, 8]
    percentile: 0.90
    lr: 0.20
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  - name: resampling_window_probe
    enabled: true
    methods: [resampling]
    guidance_start_step: [2, 4, 6]
    guidance_n_steps: [4, 6, 8]
    percentile: 0.90
    lr: 0.20
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  # Mask probe: lower percentile means more pixels get corrected; high percentile
  # means only the most uncertain locations get touched.
  - name: gradient_percentile_probe
    enabled: true
    methods: [gradient]
    guidance_start_step: 4
    guidance_n_steps: 6
    percentile: [0.75, 0.85, 0.90, 0.95]
    lr: 0.20
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  - name: resampling_percentile_probe
    enabled: true
    methods: [resampling]
    guidance_start_step: 4
    guidance_n_steps: 6
    percentile: [0.75, 0.85, 0.90, 0.95]
    lr: 0.20
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  # Laplace-data probe: check whether uncertainty is poor because the Laplace
  # estimate is underfit. This is more expensive but still bounded.
  - name: gradient_laplace_probe
    enabled: true
    methods: [gradient]
    guidance_start_step: 4
    guidance_n_steps: 6
    percentile: 0.90
    lr: 0.20
    num_mc: 3
    n_ref: [1, 3]
    n_pairs: [10, 20, 50]

  - name: resampling_laplace_probe
    enabled: true
    methods: [resampling]
    guidance_start_step: 4
    guidance_n_steps: 6
    percentile: 0.90
    lr: 0.20
    num_mc: 3
    n_ref: [1, 3]
    n_pairs: [10, 20, 50]

  # Subnet Laplace is much slower and riskier. Enable only if last_layer looks
  # promising or if the overnight budget is very large.
  - name: subnet_probe
    enabled: false
    methods: [gradient]
    laplace_mode: subnet
    guidance_start_step: 4
    guidance_n_steps: 6
    percentile: [0.85, 0.90]
    lr: [0.10, 0.20]
    n_ref: 1
    n_pairs: 10
    n_mc_subnet: 4
    subnet_max_params: 20000
