program: scripts/sweep_uq_sd.py
method: bayes
run_cap: 120
metric:
  goal: maximize
  name: delta_clip

parameters:
  method:
    values: ["gradient", "resampling"]

  lr:
    distribution: log_uniform_values
    min: 0.01
    max: 0.8

  percentile:
    distribution: uniform
    min: 0.70
    max: 0.98

  guidance_start_step:
    values: [0, 5, 10, 15, 20]

  guidance_n_steps:
    values: [5, 10, 15, 20, 30]

  n_pairs:
    values: [10, 20, 50, 100]

  n_ref:
    values: [1, 3, 5]

  guidance_scale:
    values: [5.0, 7.5, 10.0]

  # Fixed.
  model_id:
    value: "CompVis/stable-diffusion-v1-4"
  num_steps:
    value: 50
  num_eval_prompts:
    value: 20
  laplace_mode:
    value: "last_layer"
  num_mc:
    value: 3
  n_mc_subnet:
    value: 4
  subnet_max_params:
    value: 20000
