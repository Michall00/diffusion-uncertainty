# Overnight diagnostic sweep for Stable Diffusion UQ guidance at 50 DDIM steps.
#
# This mirrors stable_diffusion_overnight_epistemic.yaml, but scales the
# guidance windows from the 20-step setup to roughly equivalent 50-step windows.
# Cost is about 2.5x higher than the 20-step version, plus extra cost in
# reference-latent generation for epistemic methods.

project_name: diffusion-uncertainty-overnight-epistemic-50steps
model_id: CompVis/stable-diffusion-v1-4

defaults:
  device: cuda
  num_steps: 50
  guidance_scale: 7.5
  guidance_start_step: 0
  guidance_n_steps: 20
  percentile: 0.90
  lr: 0.20
  height: 512
  width: 512
  num_mc: 3

  laplace_mode: last_layer
  n_ref: 1
  n_pairs: 20
  n_mc_subnet: 4
  subnet_max_params: 20000

seeds: [42]
prompts:
  - "a photo of a cat"

sweep:
  - name: fixed_baseline
    enabled: true
    methods: [baseline]

  - name: fixed_aleatoric_best_scaled
    enabled: true
    methods: [aleatoric]
    guidance_start_step: 0
    guidance_n_steps: 20
    percentile: 0.95
    lr: 1.0
    num_mc: 5

  - name: gradient_lr_probe
    enabled: true
    methods: [gradient]
    guidance_start_step: 0
    guidance_n_steps: 20
    percentile: 0.90
    lr: [0.03, 0.05, 0.10, 0.20, 0.30, 0.50]
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  - name: resampling_lr_probe
    enabled: true
    methods: [resampling]
    guidance_start_step: 0
    guidance_n_steps: 20
    percentile: 0.90
    lr: [0.03, 0.05, 0.10, 0.20, 0.30, 0.50]
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  # Scaled from 20-step starts [2, 4, 6] and windows [4, 6, 8].
  - name: gradient_window_probe
    enabled: true
    methods: [gradient]
    guidance_start_step: [5, 10, 15]
    guidance_n_steps: [10, 15, 20]
    percentile: 0.90
    lr: 0.20
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  - name: resampling_window_probe
    enabled: true
    methods: [resampling]
    guidance_start_step: [5, 10, 15]
    guidance_n_steps: [10, 15, 20]
    percentile: 0.90
    lr: 0.20
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  - name: gradient_percentile_probe
    enabled: true
    methods: [gradient]
    guidance_start_step: 10
    guidance_n_steps: 15
    percentile: [0.75, 0.85, 0.90, 0.95]
    lr: 0.20
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  - name: resampling_percentile_probe
    enabled: true
    methods: [resampling]
    guidance_start_step: 10
    guidance_n_steps: 15
    percentile: [0.75, 0.85, 0.90, 0.95]
    lr: 0.20
    num_mc: 3
    n_ref: 1
    n_pairs: 20

  - name: gradient_laplace_probe
    enabled: true
    methods: [gradient]
    guidance_start_step: 10
    guidance_n_steps: 15
    percentile: 0.90
    lr: 0.20
    num_mc: 3
    n_ref: [1, 3]
    n_pairs: [10, 20, 50]

  - name: resampling_laplace_probe
    enabled: true
    methods: [resampling]
    guidance_start_step: 10
    guidance_n_steps: 15
    percentile: 0.90
    lr: 0.20
    num_mc: 3
    n_ref: [1, 3]
    n_pairs: [10, 20, 50]

  - name: subnet_probe
    enabled: false
    methods: [gradient]
    laplace_mode: subnet
    guidance_start_step: 10
    guidance_n_steps: 15
    percentile: [0.85, 0.90]
    lr: [0.10, 0.20]
    n_ref: 1
    n_pairs: 10
    n_mc_subnet: 4
    subnet_max_params: 20000
