# Sweep configuration for scripts/run_uq_sweep.py.
#
# The default profile is sized for an overnight CUDA run. Start with:
#
#   uv run --extra cu118 --group dev python scripts/run_uq_sweep.py \
#     --config config/stable_diffusion_uq_sweep.yaml \
#     --device cuda --dry-run
#
# Then remove --dry-run and optionally add --wandb.

project_name: diffusion-uncertainty-uq
model_id: runwayml/stable-diffusion-v1-5

defaults:
  device: cuda
  num_steps: 30
  guidance_scale: 7.5
  guidance_start_step: 0
  height: 512
  width: 512
  n_ref: 3
  n_pairs: 50
  num_mc: 5
  n_mc_subnet: 4
  subnet_max_params: 20000

seeds: [42, 123]

prompts:
  - "a serene mountain lake at sunset with reflections"
  - "a dense foggy forest with light rays breaking through the trees"
  - "a ceramic teapot on a wooden table with soft studio lighting"
  - "a golden retriever puppy playing in autumn leaves"
  - "a gothic cathedral interior with stained glass windows bathed in light"
  - "a cozy wooden cabin in a snow-covered pine forest at night"

sweep:
  # Main sweep: both epistemic guidance variants, sharing one Laplace fit per
  # prompt/seed/trial because gradient runs before resampling.
  - name: last_layer_epistemic
    enabled: true
    methods: [baseline, gradient, resampling]
    laplace_mode: last_layer
    guidance_n_steps: [10, 20]
    lr: [0.3, 0.5, 1.0]
    percentile: [0.85, 0.90, 0.95]

  # Aleatoric baseline sweep. Keep it separate because its uncertainty estimate
  # is driven by MC re-noising rather than Laplace.
  - name: aleatoric_mc
    enabled: true
    methods: [baseline, aleatoric]
    laplace_mode: last_layer
    guidance_n_steps: [10, 20]
    lr: [0.5, 1.0]
    percentile: [0.90, 0.95]
    num_mc: [3, 5]

  # Subnet Laplace is much slower. It is disabled by default; enable with
  # --include-disabled or set enabled: true after the last_layer sweep looks sane.
  - name: subnet_probe
    enabled: false
    methods: [baseline, gradient, resampling]
    laplace_mode: subnet
    guidance_n_steps: [10]
    lr: [0.5]
    percentile: [0.90]
    n_ref: 1
    n_pairs: 10
    n_mc_subnet: [4]
    subnet_max_params: [20000]
